name: Daily Digest

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Yahoo token
        run: |
          echo '${{ secrets.YAHOO_TOKEN_JSON }}' > token.json
          python -c "import json; json.load(open('token.json'))" || (echo "❌ token.json is invalid — update YAHOO_TOKEN_JSON secret" && exit 1)

      - name: Sync managers.json from fbp-trade-bot
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # managers.json is the authoritative team_id ↔ abbr map
          # (schema: {"teams": {"WAR": {"yahoo_team_id": "12", ...}}}).
          # Mirrors the combined_players.json sync pattern used by fbp-hub.
          mkdir -p data
          for REPO in FBPTradeBot fbp-trade-bot; do
            for BRANCH in main master; do
              URL="https://api.github.com/repos/zpressley/${REPO}/contents/data/managers.json?ref=${BRANCH}"
              RESP=$(curl -s -H "Authorization: token ${GH_TOKEN}" \
                            -H "Accept: application/vnd.github.v3.raw" "$URL")
              if [ -n "$RESP" ] && ! echo "$RESP" | grep -q '"message":"Not Found"'; then
                echo "$RESP" > data/managers.json
                if python -c "import json; json.load(open('data/managers.json'))" 2>/dev/null; then
                  SIZE=$(wc -c < data/managers.json | tr -d ' ')
                  echo "✅ managers.json pulled from ${REPO}@${BRANCH} (${SIZE} bytes)"
                  exit 0
                else
                  echo "⚠️  ${REPO}@${BRANCH} returned non-JSON, trying next"
                  rm -f data/managers.json
                fi
              fi
            done
          done
          echo "⚠️  Could not fetch managers.json from fbp-trade-bot — digest will fall back to sync_managers() auto-derive"

      - name: Run daily digest
        env:
          YAHOO_TOKEN_PATH: ./token.json
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_LEAGUE_ID: ${{ secrets.YAHOO_LEAGUE_ID }}
          YAHOO_GAME_KEY: ${{ secrets.YAHOO_GAME_KEY }}
          YAHOO_TEAM_ID: ${{ secrets.YAHOO_TEAM_ID }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          COMBINED_PLAYERS_PATH: ./data/combined_players.json
          MY_TEAM_ABBR: WAR
        run: PYTHONPATH=. python src/daily_digest.py

      - name: Update Yahoo token secret
        run: cat token.json | gh secret set YAHOO_TOKEN_JSON
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit snapshots
        run: |
          git config --global user.name "email-digest-bot"
          git config --global user.email "bot@email-digest"
          git add data/snapshots/
          git diff --staged --quiet || git commit -m "chore: daily snapshot $(date +%Y-%m-%d)"
          git push